<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1a14"/>
      <stop offset="50%" stop-color="#0d2119"/>
      <stop offset="100%" stop-color="#081510"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0AC18E"/>
      <stop offset="100%" stop-color="#0DE8AB"/>
    </linearGradient>
    <linearGradient id="chipGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0AC18E" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0AC18E" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03" stroke="#0AC18E" stroke-width="1">
    <line x1="0" y1="0" x2="0" y2="675"/><line x1="60" y1="0" x2="60" y2="675"/>
    <line x1="120" y1="0" x2="120" y2="675"/><line x1="180" y1="0" x2="180" y2="675"/>
    <line x1="240" y1="0" x2="240" y2="675"/><line x1="300" y1="0" x2="300" y2="675"/>
    <line x1="360" y1="0" x2="360" y2="675"/><line x1="420" y1="0" x2="420" y2="675"/>
    <line x1="480" y1="0" x2="480" y2="675"/><line x1="540" y1="0" x2="540" y2="675"/>
    <line x1="600" y1="0" x2="600" y2="675"/><line x1="660" y1="0" x2="660" y2="675"/>
    <line x1="720" y1="0" x2="720" y2="675"/><line x1="780" y1="0" x2="780" y2="675"/>
    <line x1="840" y1="0" x2="840" y2="675"/><line x1="900" y1="0" x2="900" y2="675"/>
    <line x1="960" y1="0" x2="960" y2="675"/><line x1="1020" y1="0" x2="1020" y2="675"/>
    <line x1="1080" y1="0" x2="1080" y2="675"/><line x1="1140" y1="0" x2="1140" y2="675"/>
    <line x1="0" y1="60" x2="1200" y2="60"/><line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="420" x2="1200" y2="420"/><line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="540" x2="1200" y2="540"/><line x1="0" y1="600" x2="1200" y2="600"/>
  </g>

  <!-- Decorative chip outline (right side) -->
  <g transform="translate(920, 337)" opacity="0.08">
    <rect x="-120" y="-120" width="240" height="240" rx="20" fill="none" stroke="#0AC18E" stroke-width="3"/>
    <rect x="-80" y="-148" width="12" height="40" rx="3" fill="#0AC18E"/>
    <rect x="-48" y="-148" width="12" height="40" rx="3" fill="#0AC18E"/>
    <rect x="-16" y="-148" width="12" height="40" rx="3" fill="#0AC18E"/>
    <rect x="16" y="-148" width="12" height="40" rx="3" fill="#0AC18E"/>
    <rect x="48" y="-148" width="12" height="40" rx="3" fill="#0AC18E"/>
    <rect x="80" y="-148" width="12" height="40" rx="3" fill="#0AC18E"/>
    <rect x="-80" y="108" width="12" height="40" rx="3" fill="#0AC18E"/>
    <rect x="-48" y="108" width="12" height="40" rx="3" fill="#0AC18E"/>
    <rect x="-16" y="108" width="12" height="40" rx="3" fill="#0AC18E"/>
    <rect x="16" y="108" width="12" height="40" rx="3" fill="#0AC18E"/>
    <rect x="48" y="108" width="12" height="40" rx="3" fill="#0AC18E"/>
    <rect x="80" y="108" width="12" height="40" rx="3" fill="#0AC18E"/>
    <rect x="-148" y="-80" width="40" height="12" rx="3" fill="#0AC18E"/>
    <rect x="-148" y="-48" width="40" height="12" rx="3" fill="#0AC18E"/>
    <rect x="-148" y="-16" width="40" height="12" rx="3" fill="#0AC18E"/>
    <rect x="-148" y="16" width="40" height="12" rx="3" fill="#0AC18E"/>
    <rect x="-148" y="48" width="40" height="12" rx="3" fill="#0AC18E"/>
    <rect x="-148" y="80" width="40" height="12" rx="3" fill="#0AC18E"/>
    <rect x="108" y="-80" width="40" height="12" rx="3" fill="#0AC18E"/>
    <rect x="108" y="-48" width="40" height="12" rx="3" fill="#0AC18E"/>
    <rect x="108" y="-16" width="40" height="12" rx="3" fill="#0AC18E"/>
    <rect x="108" y="16" width="40" height="12" rx="3" fill="#0AC18E"/>
    <rect x="108" y="48" width="40" height="12" rx="3" fill="#0AC18E"/>
    <rect x="108" y="80" width="40" height="12" rx="3" fill="#0AC18E"/>
  </g>

  <!-- Accent line top -->
  <rect x="80" y="0" width="400" height="3" fill="url(#accentGrad)" opacity="0.6"/>

  <!-- Main title -->
  <text x="80" y="180" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="72" font-weight="700" fill="#ffffff">mem-cash</text>

  <!-- Subtitle -->
  <text x="80" y="235" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="24" fill="#8BCCB4">In-memory BCH VM and Electrum Cash protocol for TypeScript</text>

  <!-- Divider -->
  <rect x="80" y="265" width="60" height="3" rx="1.5" fill="#0AC18E"/>

  <!-- Feature bullets -->
  <g font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="26" fill="#9DB8AC">
    <text x="80" y="310"><tspan fill="#0AC18E">+</tspan>  Core Fulcrum JSON-RPC methods</text>
    <text x="80" y="345"><tspan fill="#0AC18E">+</tspan>  libauth VM + BCHN consensus/policy checks</text>
    <text x="80" y="380"><tspan fill="#0AC18E">+</tspan>  Transaction debugging</text>
    <text x="80" y="415"><tspan fill="#0AC18E">+</tspan>  UTXO set, mempool, subscriptions</text>
    <text x="80" y="450"><tspan fill="#0AC18E">+</tspan>  Tree-shakeable ESM, zero classes</text>
  </g>

  <!-- Speed stat -->
  <g transform="translate(80, 503)">
    <rect width="480" height="72" rx="12" fill="url(#chipGrad)" stroke="#0AC18E" stroke-width="1" stroke-opacity="0.3"/>
    <text x="24" y="30" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#6B9A88" letter-spacing="2">MAINNET-JS TEST TIMES</text>
    <text x="24" y="56" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="22" fill="#ffffff">
      <tspan fill="#ff6b6b">10 min</tspan>
      <tspan fill="#4a6a5e" dx="8">---></tspan>
      <tspan fill="#0AC18E" dx="8">40 sec</tspan>
    </text>
  </g>

  <!-- GitHub URL -->
  <text x="80" y="645" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="24" fill="#3d5a4e">github.com/mainnet-pat/mem-cash</text>

  <!-- Accent line bottom -->
  <rect x="80" y="672" width="300" height="3" fill="url(#accentGrad)" opacity="0.4"/>
</svg>
